name: Build CUDA Wheels

on:
  workflow_dispatch:
    inputs:
      runs-on-x86:
        description: "Runner for x86_64 builds"
        required: true
        type: string
        default: "ubuntu-24.04"
      runs-on-arm:
        description: "Runner for aarch64 builds"
        required: true
        type: string
        default: "ubuntu-24.04-arm"
      python-version:
        description: "Python version"
        required: true
        type: string
        default: "3.12"
      cuda-version:
        description: "CUDA toolkit version (e.g., 13.0.0)"
        required: true
        type: string
        default: "13.0.0"
      torch-version:
        description: "PyTorch version (e.g., 2.10.0)"
        required: true
        type: string
        default: "2.10.0"
      torch-cuda-arch-list:
        description: "CUDA architectures to target (semicolon-separated)"
        required: true
        type: string
        default: "7.5;8.0;8.6;8.9;9.0;10.0;12.0;12.1"
      upload-to-release:
        description: "Upload built wheels to a GitHub release"
        type: boolean
        default: true
      override-previous:
        description: "Override existing release assets with the same name"
        type: boolean
        default: false
      release-tag:
        description: "Release tag (leave empty for auto: torch{X.Y}-cu{MAJMIN})"
        type: string
        default: ""

defaults:
  run:
    shell: bash -x -e -u -o pipefail {0}

jobs:
  create-release:
    name: Create release
    if: ${{ inputs.upload-to-release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute release tag
        id: tag
        run: |
          TAG="${{ inputs.release-tag }}"
          if [ -z "$TAG" ]; then
            CUDA_MAJOR=$(echo "${{ inputs.cuda-version }}" | cut -d. -f1)
            CUDA_MINOR=$(echo "${{ inputs.cuda-version }}" | cut -d. -f2)
            TORCH_MAJOR=$(echo "${{ inputs.torch-version }}" | cut -d. -f1)
            TORCH_MINOR=$(echo "${{ inputs.torch-version }}" | cut -d. -f2)
            TAG="torch${TORCH_MAJOR}.${TORCH_MINOR}-cu${CUDA_MAJOR}${CUDA_MINOR}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release (if it does not exist)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes "CUDA wheels for PyTorch ${{ inputs.torch-version }} + CUDA ${{ inputs.cuda-version }}" \
            2>/dev/null || true

  build-xformers:
    needs: [create-release]
    if: ${{ !cancelled() }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ${{ inputs.runs-on-x86 }}
          - arch: aarch64
            runner: ${{ inputs.runs-on-arm }}
    runs-on: ${{ matrix.runner }}
    name: Build xformers (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v5

      - name: Check if wheel already exists
        id: check
        if: ${{ inputs.upload-to-release && !inputs.override-previous }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(uname -m)
          ASSETS=$(gh release view "${{ needs.create-release.outputs.tag }}" --json assets -q '.assets[].name' 2>/dev/null || echo "")
          if echo "$ASSETS" | grep "^xformers-" | grep -q "$ARCH"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::xformers ($ARCH) wheel already exists in release, skipping build"
          fi

      - name: Free disk space
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL

      - name: Set up swap space
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 16

      - name: Set up Python
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set environment from inputs
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: |
          echo "PYTORCH_VERSION=${{ inputs.torch-version }}" >> $GITHUB_ENV
          echo "CUDA_VERSION=${{ inputs.cuda-version }}" >> $GITHUB_ENV
          echo "TORCH_CUDA_ARCH_LIST=${{ inputs.torch-cuda-arch-list }}" >> $GITHUB_ENV
          CUDA_MAJOR=$(echo "${{ inputs.cuda-version }}" | cut -d. -f1)
          CUDA_MINOR=$(echo "${{ inputs.cuda-version }}" | cut -d. -f2)
          echo "CUDA_SHORT=cu${CUDA_MAJOR}${CUDA_MINOR}" >> $GITHUB_ENV

      - name: Install CUDA ${{ inputs.cuda-version }}
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ inputs.cuda-version }}
          linux-local-args: '["--toolkit"]'
          method: "network"
          sub-packages: '["nvcc", "libraries-dev"]'

      - name: Install PyTorch
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir torch==${{ inputs.torch-version }} \
            --index-url https://download.pytorch.org/whl/${CUDA_SHORT}

      - name: Build xformers
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: bash scripts/build-xformers.sh

      - name: Upload wheel to release
        if: ${{ steps.check.outputs.skip != 'true' && inputs.upload-to-release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLOBBER_FLAG=""
          if [ "${{ inputs.override-previous }}" = "true" ]; then
            CLOBBER_FLAG="--clobber"
          fi
          gh release upload "${{ needs.create-release.outputs.tag }}" wheels/*.whl $CLOBBER_FLAG 2>&1 | tee /tmp/upload.log || {
            if grep -q "already exists" /tmp/upload.log; then
              echo "::warning::Wheel already exists in release, skipping upload"
            else
              exit 1
            fi
          }

  build-pyg:
    needs: [create-release]
    if: ${{ !cancelled() }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package: [pytorch_cluster, pytorch_sparse, pytorch_scatter]
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ${{ inputs.runs-on-x86 }}
          - arch: aarch64
            runner: ${{ inputs.runs-on-arm }}
    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.package }} (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v5

      - name: Check if wheel already exists
        id: check
        if: ${{ inputs.upload-to-release && !inputs.override-previous }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(uname -m)
          WHEEL_PREFIX=$(echo "${{ matrix.package }}" | sed 's/^pytorch_/torch_/')
          ASSETS=$(gh release view "${{ needs.create-release.outputs.tag }}" --json assets -q '.assets[].name' 2>/dev/null || echo "")
          if echo "$ASSETS" | grep "^${WHEEL_PREFIX}-" | grep -q "$ARCH"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::${WHEEL_PREFIX} ($ARCH) wheel already exists in release, skipping build"
          fi

      - name: Free disk space
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL

      - name: Set up swap space
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 16

      - name: Set up Python
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set environment from inputs
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: |
          echo "PYTORCH_VERSION=${{ inputs.torch-version }}" >> $GITHUB_ENV
          echo "CUDA_VERSION=${{ inputs.cuda-version }}" >> $GITHUB_ENV
          echo "TORCH_CUDA_ARCH_LIST=${{ inputs.torch-cuda-arch-list }}" >> $GITHUB_ENV
          CUDA_MAJOR=$(echo "${{ inputs.cuda-version }}" | cut -d. -f1)
          CUDA_MINOR=$(echo "${{ inputs.cuda-version }}" | cut -d. -f2)
          echo "CUDA_SHORT=cu${CUDA_MAJOR}${CUDA_MINOR}" >> $GITHUB_ENV

      - name: Install CUDA ${{ inputs.cuda-version }}
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ inputs.cuda-version }}
          linux-local-args: '["--toolkit"]'
          method: "network"
          sub-packages: '["nvcc", "libraries-dev"]'

      - name: Install PyTorch
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir torch==${{ inputs.torch-version }} \
            --index-url https://download.pytorch.org/whl/${CUDA_SHORT}

      - name: Build ${{ matrix.package }}
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: bash scripts/build-pyg.sh "${{ matrix.package }}"

      - name: Upload wheel to release
        if: ${{ steps.check.outputs.skip != 'true' && inputs.upload-to-release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLOBBER_FLAG=""
          if [ "${{ inputs.override-previous }}" = "true" ]; then
            CLOBBER_FLAG="--clobber"
          fi
          gh release upload "${{ needs.create-release.outputs.tag }}" wheels/*.whl $CLOBBER_FLAG 2>&1 | tee /tmp/upload.log || {
            if grep -q "already exists" /tmp/upload.log; then
              echo "::warning::Wheel already exists in release, skipping upload"
            else
              exit 1
            fi
          }

  build-torchao:
    needs: [create-release]
    if: ${{ !cancelled() }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ${{ inputs.runs-on-x86 }}
          - arch: aarch64
            runner: ${{ inputs.runs-on-arm }}
    runs-on: ${{ matrix.runner }}
    name: Build torchao (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v5

      - name: Check if wheel already exists
        id: check
        if: ${{ inputs.upload-to-release && !inputs.override-previous }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(uname -m)
          ASSETS=$(gh release view "${{ needs.create-release.outputs.tag }}" --json assets -q '.assets[].name' 2>/dev/null || echo "")
          if echo "$ASSETS" | grep "^torchao-" | grep -q "$ARCH"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::torchao ($ARCH) wheel already exists in release, skipping build"
          fi

      - name: Free disk space
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL

      - name: Set up swap space
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 16

      - name: Set up Python
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set environment from inputs
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: |
          echo "PYTORCH_VERSION=${{ inputs.torch-version }}" >> $GITHUB_ENV
          echo "CUDA_VERSION=${{ inputs.cuda-version }}" >> $GITHUB_ENV
          echo "TORCH_CUDA_ARCH_LIST=${{ inputs.torch-cuda-arch-list }}" >> $GITHUB_ENV
          CUDA_MAJOR=$(echo "${{ inputs.cuda-version }}" | cut -d. -f1)
          CUDA_MINOR=$(echo "${{ inputs.cuda-version }}" | cut -d. -f2)
          echo "CUDA_SHORT=cu${CUDA_MAJOR}${CUDA_MINOR}" >> $GITHUB_ENV

      - name: Install CUDA ${{ inputs.cuda-version }}
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ inputs.cuda-version }}
          linux-local-args: '["--toolkit"]'
          method: "network"
          sub-packages: '["nvcc", "libraries-dev"]'

      - name: Install PyTorch
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir torch==${{ inputs.torch-version }} \
            --index-url https://download.pytorch.org/whl/${CUDA_SHORT}

      - name: Build torchao
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: bash scripts/build-torchao.sh

      - name: Upload wheel to release
        if: ${{ steps.check.outputs.skip != 'true' && inputs.upload-to-release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLOBBER_FLAG=""
          if [ "${{ inputs.override-previous }}" = "true" ]; then
            CLOBBER_FLAG="--clobber"
          fi
          gh release upload "${{ needs.create-release.outputs.tag }}" wheels/*.whl $CLOBBER_FLAG 2>&1 | tee /tmp/upload.log || {
            if grep -q "already exists" /tmp/upload.log; then
              echo "::warning::Wheel already exists in release, skipping upload"
            else
              exit 1
            fi
          }

  build-flash-attention:
    needs: [create-release]
    if: ${{ !cancelled() }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ${{ inputs.runs-on-x86 }}
          - arch: aarch64
            runner: ${{ inputs.runs-on-arm }}
    runs-on: ${{ matrix.runner }}
    name: Build flash-attention (${{ matrix.arch }})
    steps:
      - uses: actions/checkout@v5

      - name: Check if wheel already exists
        id: check
        if: ${{ inputs.upload-to-release && !inputs.override-previous }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=$(uname -m)
          ASSETS=$(gh release view "${{ needs.create-release.outputs.tag }}" --json assets -q '.assets[].name' 2>/dev/null || echo "")
          if echo "$ASSETS" | grep "^flash_attn-" | grep -v "fa4" | grep -q "$ARCH"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::flash-attention 2 ($ARCH) wheel already exists in release, skipping build"
          fi

      - name: Free disk space
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL

      - name: Set up swap space
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: pierotofy/set-swap-space@v1.0
        with:
          swap-size-gb: 16

      - name: Set up Python
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set environment from inputs
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: |
          echo "PYTORCH_VERSION=${{ inputs.torch-version }}" >> $GITHUB_ENV
          echo "CUDA_VERSION=${{ inputs.cuda-version }}" >> $GITHUB_ENV
          echo "TORCH_CUDA_ARCH_LIST=${{ inputs.torch-cuda-arch-list }}" >> $GITHUB_ENV
          CUDA_MAJOR=$(echo "${{ inputs.cuda-version }}" | cut -d. -f1)
          CUDA_MINOR=$(echo "${{ inputs.cuda-version }}" | cut -d. -f2)
          echo "CUDA_SHORT=cu${CUDA_MAJOR}${CUDA_MINOR}" >> $GITHUB_ENV

      - name: Install CUDA ${{ inputs.cuda-version }}
        if: ${{ steps.check.outputs.skip != 'true' }}
        uses: Jimver/cuda-toolkit@v0.2.30
        with:
          cuda: ${{ inputs.cuda-version }}
          linux-local-args: '["--toolkit"]'
          method: "network"
          sub-packages: '["nvcc", "libraries-dev"]'

      - name: Install PyTorch
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir torch==${{ inputs.torch-version }} \
            --index-url https://download.pytorch.org/whl/${CUDA_SHORT}

      - name: Build flash-attention
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: bash scripts/build-flash-attention.sh

      - name: Upload wheel to release
        if: ${{ steps.check.outputs.skip != 'true' && inputs.upload-to-release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLOBBER_FLAG=""
          if [ "${{ inputs.override-previous }}" = "true" ]; then
            CLOBBER_FLAG="--clobber"
          fi
          gh release upload "${{ needs.create-release.outputs.tag }}" wheels/*.whl $CLOBBER_FLAG 2>&1 | tee /tmp/upload.log || {
            if grep -q "already exists" /tmp/upload.log; then
              echo "::warning::Wheel already exists in release, skipping upload"
            else
              exit 1
            fi
          }

  build-flash-attention-4:
    name: Build flash-attention-4
    needs: [create-release]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Check if wheel already exists
        id: check
        if: ${{ inputs.upload-to-release && !inputs.override-previous }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS=$(gh release view "${{ needs.create-release.outputs.tag }}" --json assets -q '.assets[].name' 2>/dev/null || echo "")
          if echo "$ASSETS" | grep -q "^flash_attn_4-"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::flash-attention-4 wheel already exists in release, skipping"
          fi

      - name: Build flash-attention-4
        if: ${{ steps.check.outputs.skip != 'true' }}
        run: bash scripts/build-flash-attention-4.sh

      - name: Upload wheel to release
        if: ${{ steps.check.outputs.skip != 'true' && inputs.upload-to-release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLOBBER_FLAG=""
          if [ "${{ inputs.override-previous }}" = "true" ]; then
            CLOBBER_FLAG="--clobber"
          fi
          gh release upload "${{ needs.create-release.outputs.tag }}" wheels/*.whl $CLOBBER_FLAG 2>&1 | tee /tmp/upload.log || {
            if grep -q "already exists" /tmp/upload.log; then
              echo "::warning::Wheel already exists in release, skipping upload"
            else
              exit 1
            fi
          }
